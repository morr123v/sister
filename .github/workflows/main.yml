name: Stirling-PDF + Tailscale Funnel

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      STIRLING_PORT: 8080

    steps:
      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com | sudo sh
          sudo usermod -aG docker ${USER}
          sudo systemctl start docker

      - name: Run Stirling-PDF
        run: |
          docker run -d \
            --name stirling-pdf \
            -p ${STIRLING_PORT}:8080 \
            --restart=unless-stopped \
            docker.stirlingpdf.com/stirlingtools/stirling-pdf

          echo "Waiting for Stirling-PDF to be ready..."
          for i in {1..30}; do
            if curl -s -f -o /dev/null --max-time 5 http://localhost:${STIRLING_PORT}; then
              echo "✓ Stirling-PDF is ready"
              break
            fi
            sleep 3
          done

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: stirling-pdf-${{ github.run_id }}

      - name: Enable Tailscale Funnel for Stirling-PDF
        run: |
          sudo apt-get install -y -qq jq
          sudo tailscale funnel ${STIRLING_PORT}
          sleep 5
          sudo tailscale funnel status || true

          FUNNEL_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          echo "FUNNEL_URL=https://${FUNNEL_DNS}" >> $GITHUB_ENV

      - name: Connection Information
        run: |
          TS_IP=$(tailscale ip -4 | head -n1)
          echo "============================================================"
          echo "           Stirling-PDF + Tailscale Funnel                   "
          echo "============================================================"
          echo "Stirling-PDF (Tailnet IP):"
          echo "  URL: http://${TS_IP}:${STIRLING_PORT}"
          echo ""
          echo "Stirling-PDF via Tailscale Funnel (Public HTTPS):"
          echo "  URL: ${FUNNEL_URL}"
          echo ""
          echo "Workflow will stay alive until you cancel it."
          echo "============================================================"

      - name: Keep Alive
        run: while true; do sleep 600; done
